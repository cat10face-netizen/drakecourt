<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚖️ DrakeCourt | Суд Штата Дрейк</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
    <!-- Экран входа -->
    <div id="loginScreen" class="screen active">
        <div class="login-container">
            <div class="logo-section">
                <div class="logo-icon">⚖️</div>
                <h1>DrakeCourt</h1>
                <p>Суд Штата Дрейк</p>
            </div>
            
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="showLogin()">🔑 Вход</button>
                <button class="auth-tab" onclick="showRequest()">📝 Заявка на доступ</button>
            </div>
            
            <!-- Форма входа -->
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label>🔑 Логин</label>
                    <input type="text" id="loginInput" placeholder="Введите логин" required>
                </div>
                <div class="form-group">
                    <label>🔒 Пароль</label>
                    <input type="password" id="passwordInput" placeholder="Введите пароль" required>
                </div>
                <button type="submit" class="btn-primary">⚖️ Войти</button>
            </form>
            
            <!-- Форма заявки -->
            <form id="requestForm" class="auth-form" style="display:none;">
                <div class="form-group">
                    <label> Ссылка VK</label>
                    <input type="url" id="req_vk" placeholder="https://vk.com/id..." required>
                </div>
                <div class="form-group">
                    <label>👤 Ваш никнейм (RP)</label>
                    <input type="text" id="req_name" placeholder="Имя Фамилия" required>
                </div>
                <div class="form-group">
                    <label> Придумайте пароль</label>
                    <input type="password" id="req_password" placeholder="Минимум 6 символов" required>
                </div>
                <div class="form-group">
                    <label>🔒 Повторите пароль</label>
                    <input type="password" id="req_password_confirm" placeholder="Повторите пароль" required>
                </div>
                <div class="form-group">
                    <label>📝 Причина запроса</label>
                    <textarea id="req_reason" rows="3" placeholder="Почему вы хотите получить доступ?" required></textarea>
                </div>
                <button type="submit" class="btn-primary">💙 Отправить заявку</button>
            </form>
            
            <p class="footer-text">Доступ имеют только сотрудники Суда Штата Дрейк</p>
            <a href="https://vk.ru/danteshill" target="_blank" class="contact-link">💬 Связь с ГС ЦА</a>
        </div>
    </div>

    <!-- Основное приложение -->
    <div id="appScreen" class="screen">
        <header class="app-header">
            <div class="header-left">
                <div class="logo-icon">⚖️</div>
                <div class="title-block">
                    <h1>DrakeCourt</h1>
                    <p>СУД ШТАТА ДРЕЙК</p>
                </div>
            </div>
            <div class="header-right">
                <div class="user-info">
                    <span id="userName"></span>
                    <span id="userRole"></span>
                </div>
                <button id="themeToggle" class="btn-icon">🌓 Тема</button>
                <button id="accessBtn" class="btn-icon" onclick="showAccessPanel()">👑 Доступ</button>
                <button id="logoutBtn" class="btn-icon">🚪 Выйти</button>
            </div>
        </header>

        <!-- Панель управления доступом -->
        <div id="accessPanel" class="access-panel" style="display:none;">
            <h3>👑 Управление доступом</h3>
            <form id="addUserForm">
                <select id="newRole" required>
                    <option value="">Выберите роль...</option>
                    <option value="judge">Судья</option>
                    <option value="watcher">Следящий ЦА</option>
                    <option value="zgs_ca">ЗГС ЦА</option>
                    <option value="gs_ca">ГС ЦА</option>
                </select>
                <input type="text" id="newLogin" placeholder="Логин" required>
                <input type="password" id="newPassword" placeholder="Пароль" required>
                <input type="text" id="newDisplayName" placeholder="Имя" required>
                <input type="text" id="newSignature" placeholder="Подпись">
                <button type="submit" class="btn-small">➕ Добавить</button>
                <button type="button" class="btn-small" onclick="syncUsers()">🔄 Синхронизировать</button>
            </form>
            <div class="users-table">
                <table>
                    <thead>
                        <tr>
                            <th>Логин</th>
                            <th>Роль</th>
                            <th>Имя</th>
                            <th>Подпись</th>
                            <th>Дата</th>
                            <th>Действие</th>
                        </tr>
                    </thead>
                    <tbody id="usersList"></tbody>
                </table>
            </div>
        </div>

        <!-- Навигация -->
        <nav class="tab-navigation">
            <button class="tab-btn active" data-tab="acceptance">✅ Принятие</button>
            <button class="tab-btn" data-tab="consideration">📋 На рассмотрение</button>
            <button class="tab-btn" data-tab="rejection">❌ Отказ</button>
            <button class="tab-btn" data-tab="verdict">⚡ Приговор</button>
        </nav>

        <!-- Контент -->
        <main class="content-area">
            <!-- Принятие -->
            <div id="acceptance" class="tab-content active">
                <div class="form-group">
                    <label>👤 Истец</label>
                    <input type="text" id="acc_plaintiff" placeholder="Имя Фамилия">
                </div>
                <div class="form-group">
                    <label>👤 Ответчик</label>
                    <input type="text" id="acc_defendant" placeholder="Через запятую">
                </div>
                <div class="form-group">
                    <label>📝 Суть иска</label>
                    <textarea id="acc_claim" rows="4" placeholder="Вставьте текст иска..."></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>📅 Дата подачи</label>
                        <input type="date" id="acc_date">
                    </div>
                    <div class="form-group">
                        <label> Время</label>
                        <input type="time" id="acc_time">
                    </div>
                </div>
                <div class="form-group">
                    <label>📅 Дата определения</label>
                    <input type="date" id="acc_verdict_date">
                </div>
                <div class="button-row">
                    <button onclick="generateAcceptance(event)" class="btn-generate">📝 Сгенерировать</button>
                    <button onclick="copyResult('acc_result')" class="btn-copy"> Скопировать</button>
                    <button onclick="downloadResult('acc_result')" class="btn-download">💾 .txt</button>
                    <button onclick="clearResult('acc_result')" class="btn-clear">🗑️ Очистить</button>
                </div>
                <div class="result-section">
                    <label>📄 Результат (BB-код)</label>
                    <textarea id="acc_result" class="result-box" readonly placeholder="Нажмите Сгенерировать..."></textarea>
                </div>
            </div>

            <!-- Рассмотрение -->
            <div id="consideration" class="tab-content">
                <div class="form-group">
                    <label> Истец</label>
                    <input type="text" id="con_plaintiff" placeholder="Имя Фамилия">
                </div>
                <div class="form-group">
                    <label>👤 Ответчик</label>
                    <input type="text" id="con_defendant" placeholder="Имя Фамилия">
                </div>
                <div class="form-group">
                    <label>📅 Дата</label>
                    <input type="date" id="con_date">
                </div>
                <div class="button-row">
                    <button onclick="generateConsideration(event)" class="btn-generate">📝 Сгенерировать</button>
                    <button onclick="copyResult('con_result')" class="btn-copy"> Скопировать</button>
                    <button onclick="downloadResult('con_result')" class="btn-download">💾 .txt</button>
                    <button onclick="clearResult('con_result')" class="btn-clear">🗑️ Очистить</button>
                </div>
                <div class="result-section">
                    <label>📄 Результат (BB-код)</label>
                    <textarea id="con_result" class="result-box" readonly placeholder="Нажмите Сгенерировать..."></textarea>
                </div>
            </div>

            <!-- Отказ -->
            <div id="rejection" class="tab-content">
                <div class="form-group">
                    <label> Истец</label>
                    <input type="text" id="rej_plaintiff" placeholder="Имя Фамилия">
                </div>
                <div class="form-group">
                    <label>❌ Причина</label>
                    <select id="rej_reason" onchange="handleReasonChange()">
                        <option value="">— Выберите —</option>
                        <option value="Нарушение формы">Нарушение формы</option>
                        <option value="Нет доказательств">Нет доказательств</option>
                        <option value="Не подсудно">Не подсудно</option>
                        <option value="ООС">ООС</option>
                        <option value="custom">✏️ Своя причина...</option>
                    </select>
                    <input type="text" id="rej_custom_reason" placeholder="✏️ Причина" style="display:none; margin-top:10px;">
                </div>
                <div class="form-group">
                    <label>📅 Дата</label>
                    <input type="date" id="rej_date">
                </div>
                <div class="button-row">
                    <button onclick="generateRejection(event)" class="btn-generate">📝 Сгенерировать</button>
                    <button onclick="copyResult('rej_result')" class="btn-copy">📋 Скопировать</button>
                    <button onclick="downloadResult('rej_result')" class="btn-download">💾 .txt</button>
                    <button onclick="clearResult('rej_result')" class="btn-clear">🗑️ Очистить</button>
                </div>
                <div class="result-section">
                    <label>📄 Результат (BB-код)</label>
                    <textarea id="rej_result" class="result-box" readonly placeholder="Нажмите Сгенерировать..."></textarea>
                </div>
            </div>

            <!-- Приговор -->
            <div id="verdict" class="tab-content">
                <div class="form-group">
                    <label>📋 УСТАНОВИЛ</label>
                    <div id="verdict_established">
                        <div class="verdict-item">
                            <span class="item-number">1</span>
                            <textarea rows="2" placeholder="Пункт 1"></textarea>
                            <button type="button" class="btn-remove" onclick="removeVerdictItem(this)">×</button>
                        </div>
                    </div>
                    <button type="button" class="btn-add" onclick="addVerdictItem('verdict_established')">➕ Добавить</button>
                </div>
                <div class="form-group">
                    <label>⚡ ОПРЕДЕЛИЛ</label>
                    <div id="verdict_determined">
                        <div class="verdict-item">
                            <span class="item-number">1</span>
                            <textarea rows="2" placeholder="Пункт 1"></textarea>
                            <button type="button" class="btn-remove" onclick="removeVerdictItem(this)">×</button>
                        </div>
                    </div>
                    <button type="button" class="btn-add" onclick="addVerdictItem('verdict_determined')">➕ Добавить</button>
                </div>
                <div class="form-group">
                    <label>📅 Дата</label>
                    <input type="date" id="ver_date">
                </div>
                <div class="button-row">
                    <button onclick="generateVerdict(event)" class="btn-generate">📝 Сгенерировать</button>
                    <button onclick="copyResult('ver_result')" class="btn-copy"> Скопировать</button>
                    <button onclick="downloadResult('ver_result')" class="btn-download">💾 .txt</button>
                    <button onclick="clearResult('ver_result')" class="btn-clear">🗑️ Очистить</button>
                </div>
                <div class="result-section">
                    <label>📄 Результат (BB-код)</label>
                    <textarea id="ver_result" class="result-box" readonly placeholder="Нажмите Сгенерировать..."></textarea>
                </div>
            </div>
        </main>

        <footer class="app-footer">
            <a href="https://vk.ru/danteshill" target="_blank" class="contact-link">💬 Связь с ГС ЦА</a>
        </footer>
    </div>

    <!-- Модальное окно смены пароля -->
    <div id="passwordModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closePasswordModal()">&times;</span>
            <h3>🔒 Сменить пароль</h3>
            <form id="changePasswordForm">
                <div class="form-group">
                    <label>Текущий пароль</label>
                    <input type="password" id="currentPassword" required>
                </div>
                <div class="form-group">
                    <label>Новый пароль</label>
                    <input type="password" id="newPassword" required>
                </div>
                <div class="form-group">
                    <label>Повторите новый пароль</label>
                    <input type="password" id="confirmNewPassword" required>
                </div>
                <div class="modal-buttons">
                    <button type="button" class="btn-cancel" onclick="closePasswordModal()">Отмена</button>
                    <button type="submit" class="btn-save">💾 Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
